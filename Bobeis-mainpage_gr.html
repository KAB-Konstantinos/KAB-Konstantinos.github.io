        .styled-btn {
  padding: 10px 33px;
  font-size: 14px;
  font-weight: bold;
  background: #ff4d2e;
  color: white;
  border: none;
  border-radius: 50px;  /* Makes it pill-shaped */
  cursor: pointer;
  transition: all 0.3s ease;  /* Smooth animation */
  box-shadow: 10px 10px 10px rgba(0,0,0,0.3);
}

.styled-btn:hover {
  background: #ff6a4b;  /* Lighter on hover */
  transform: scale(1.05);  /* Grows slightly */
}
.dropdown button {
 cursor: pointer;
}
.dropdown a{
  display: block;
  padding: 8px;
  transition: all 0.3s ease;  /* Smooth animation */
}
.dropdown .content {
  background-color: #ca5c0e;
  position: absolute;
  min-width: 160px;
  box-shadow: 10px 10px 10px rgba(0,0,0,0.3);
  display: none;
  border-radius: 10px;
 
  
}
.dropdown:hover .content {  display: block;
 
}
.dropdown:hover button { background-color: #ffffff;
  transition: all 0.3s ease;  /* Smooth animation */
}
.dropdown a:hover { background-color: #ff4d2e;
  transform: scale(1.05);  /* Grows slightly */
}

.contact-icons {

.contact-icon {

  color: #111;
  text-decoration: none;
  font-weight: bold;
  transition: transform 0.2s ease, background 0.2s ease;
}
.contact-icon:hover {
  transform: translateY(-1px);
  background: rgba(255,255,255,0.28);
}
.contact-icon svg {
  width: 24px;
  height: 24px;
  display: block;
  fill: #0088cc;
}
